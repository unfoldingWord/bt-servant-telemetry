name = "bt-servant-telemetry"
main = "src/index.ts"
compatibility_date = "2026-04-01"

[observability]
enabled = true
head_sampling_rate = 1

[vars]
ENVIRONMENT = "development"
TELEMETRY_EPOCH = "2026-04-24"

# --- Dev: PR preview deploys ---
[env.dev]
name = "bt-servant-telemetry-dev"
# routes will be set up once a custom domain exists
# routes = [{ pattern = "dev-telemetry.<domain>", custom_domain = true }]

[env.dev.vars]
ENVIRONMENT = "dev"
TELEMETRY_EPOCH = "2026-04-24"

[env.dev.observability]
enabled = true
head_sampling_rate = 1

# --- Staging: main branch deploys ---
[env.staging]
name = "bt-servant-telemetry-staging"
# routes = [{ pattern = "staging-telemetry.<domain>", custom_domain = true }]

[env.staging.vars]
ENVIRONMENT = "staging"
TELEMETRY_EPOCH = "2026-04-24"

[env.staging.observability]
enabled = true
head_sampling_rate = 1

# --- Production: manual deploy only ---
[env.production]
name = "bt-servant-telemetry-production"
# routes = [{ pattern = "telemetry.<domain>", custom_domain = true }]

[env.production.vars]
ENVIRONMENT = "production"
TELEMETRY_EPOCH = "2026-04-24"

[env.production.observability]
enabled = true
# Higher than lasker's 0.01 — telemetry's own error rate matters to us
head_sampling_rate = 0.1
