name = "bt-servant-telemetry"
main = "src/index.ts"
compatibility_date = "2026-04-01"

# Static dashboard built by SvelteKit (adapter-static) at apps/web/build/.
# Bound as ASSETS so the worker can fall through unknown routes to the
# prerendered SPA. SvelteKit's fallback: 'index.html' enables client-side
# routing without prerender entries.
[assets]
directory = "./build"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Worker runs first so /api/* and /health hit Hono, /tail hits the tail
# handler, and only unhandled paths fall through to env.ASSETS.fetch()
# from index.ts. Without this, the assets layer intercepts ALL requests
# and returns 405 for non-GET methods regardless of worker routes.
run_worker_first = true

[observability]
enabled = true
head_sampling_rate = 1

# Cron triggers — strings must mirror the constants in src/scheduled/index.ts
# exactly. Per-env overrides repeat them so a deploy to a single env carries
# its own trigger set.
[triggers]
crons = ["0 3 * * *", "0 9 * * *", "*/5 * * * *", "*/15 * * * *"]

[vars]
ENVIRONMENT = "development"
TELEMETRY_EPOCH = "2026-04-24"
CF_ACCOUNT_ID = "5a3ffd86280d3ed086be76d955829242"
# Local / no-env-flag wrangler dev pulls from staging upstream, matching the
# deployed dev worker (env.dev). Prod is the only upstream that should ever
# be hit, and only via [env.production] which sets this explicitly below.
SOURCE_WORKER_NAME = "bt-servant-worker-staging"

# Top-level D1 binding (placeholder ID — used by `wrangler dev` and tests via miniflare).
# Per-env overrides below carry the real database IDs once `wrangler d1 create` has been run.
[[d1_databases]]
binding = "DB"
database_name = "bt-servant-telemetry-local"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

# --- Dev: PR preview deploys ---
[env.dev]
name = "bt-servant-telemetry-dev"
# routes will be set up once a custom domain exists
# routes = [{ pattern = "dev-telemetry.<domain>", custom_domain = true }]

[env.dev.vars]
ENVIRONMENT = "dev"
TELEMETRY_EPOCH = "2026-04-24"
CF_ACCOUNT_ID = "5a3ffd86280d3ed086be76d955829242"
# Dev consumes staging upstream so live tail + backfill agree.
SOURCE_WORKER_NAME = "bt-servant-worker-staging"

[env.dev.observability]
enabled = true
head_sampling_rate = 1

[env.dev.triggers]
crons = ["0 3 * * *", "0 9 * * *", "*/5 * * * *", "*/15 * * * *"]

[[env.dev.d1_databases]]
binding = "DB"
database_name = "bt-servant-telemetry-dev"
database_id = "032e0aea-103a-4349-ac9c-57a3b3bba1db"
migrations_dir = "migrations"

# --- Staging: main branch deploys ---
[env.staging]
name = "bt-servant-telemetry-staging"
# routes = [{ pattern = "staging-telemetry.<domain>", custom_domain = true }]

[env.staging.vars]
ENVIRONMENT = "staging"
TELEMETRY_EPOCH = "2026-04-24"
CF_ACCOUNT_ID = "5a3ffd86280d3ed086be76d955829242"
SOURCE_WORKER_NAME = "bt-servant-worker"

[env.staging.observability]
enabled = true
head_sampling_rate = 1

[env.staging.triggers]
crons = ["0 3 * * *", "0 9 * * *", "*/5 * * * *", "*/15 * * * *"]

[[env.staging.d1_databases]]
binding = "DB"
database_name = "bt-servant-telemetry-staging"
database_id = "REPLACE_AFTER_WRANGLER_D1_CREATE_STAGING"
migrations_dir = "migrations"

# --- Production: manual deploy only ---
[env.production]
name = "bt-servant-telemetry-production"
# routes = [{ pattern = "telemetry.<domain>", custom_domain = true }]

[env.production.vars]
ENVIRONMENT = "production"
TELEMETRY_EPOCH = "2026-04-24"
CF_ACCOUNT_ID = "5a3ffd86280d3ed086be76d955829242"
SOURCE_WORKER_NAME = "bt-servant-worker"

[env.production.observability]
enabled = true
# Higher than lasker's 0.01 — telemetry's own error rate matters to us
head_sampling_rate = 0.1

[env.production.triggers]
crons = ["0 3 * * *", "0 9 * * *", "*/5 * * * *", "*/15 * * * *"]

[[env.production.d1_databases]]
binding = "DB"
database_name = "bt-servant-telemetry-production"
database_id = "07faa0db-3798-40df-af87-2fbabb05fe4f"
migrations_dir = "migrations"
