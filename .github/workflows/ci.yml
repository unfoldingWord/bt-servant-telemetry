name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Audit production dependencies
        run: pnpm audit --prod

      - name: Audit all dependencies (informational)
        run: pnpm audit || true

  version-check:
    name: Version Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify apps/web version.ts matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./apps/web/package.json').version")
          SRC_VERSION=$(grep -oP "VERSION = '\K[^']+" apps/web/src/config/version.ts)
          if [ "$PKG_VERSION" != "$SRC_VERSION" ]; then
            echo "::error::Version mismatch: apps/web/package.json=$PKG_VERSION, version.ts=$SRC_VERSION"
            exit 1
          fi
          echo "Versions match: $PKG_VERSION"

  lint:
    name: Lint
    needs: [security-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Check formatting
        run: pnpm run format:check

      - name: Run ESLint
        run: pnpm run lint

  typecheck:
    name: Type Check
    needs: [security-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run type check
        run: pnpm run check

  architecture:
    name: Architecture Check
    needs: [security-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Check architecture (depcruise)
        run: pnpm run architecture

  test:
    name: Test
    needs: [security-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm run test

  build:
    name: Build
    needs: [security-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build worker
        run: pnpm run build

      - name: Report bundle size
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for dir in apps/web/.svelte-kit/cloudflare apps/web/dist apps/web/.wrangler/dist; do
            if [ -d "$dir" ]; then
              find "$dir" -name "*.js" -type f -exec du -h {} \; | sort -rh | head -10 | while read size file; do
                echo "| \`${file#$dir/}\` | $size |" >> $GITHUB_STEP_SUMMARY
              done
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build completed successfully**" >> $GITHUB_STEP_SUMMARY

  ci-pass:
    name: CI Pass
    needs: [security-audit, version-check, lint, typecheck, architecture, test, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.security-audit.result }}" != "success" ||
                "${{ needs.version-check.result }}" != "success" ||
                "${{ needs.lint.result }}" != "success" ||
                "${{ needs.typecheck.result }}" != "success" ||
                "${{ needs.architecture.result }}" != "success" ||
                "${{ needs.test.result }}" != "success" ||
                "${{ needs.build.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"
