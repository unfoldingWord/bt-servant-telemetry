name: Deploy Staging

# DORMANT until staging is bootstrapped (D1 created, secrets set, etc.).
# When ready: switch the trigger back to
#   workflow_run: { workflows: [CI], types: [completed], branches: [main] }
# and add an `if:` guard for workflow_run.conclusion == 'success'.
# Right now it's manual-only so a main merge doesn't auto-fail every time.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Deploy to Cloudflare Workers (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          environment: staging
