name: Deploy Production

# Manual deploy via the Actions tab. The `if: refs/heads/main` guard
# below prevents accidental deploys from a feature branch even if
# someone selects the wrong ref in the workflow_dispatch dialog.
on:
  workflow_dispatch:

jobs:
  preflight:
    name: Preflight (verify CI green on main)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      checks: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Don't ship a known-broken main. Look up the latest CI run on this
      # commit and refuse to deploy if it didn't succeed. This costs a few
      # seconds and prevents the "I clicked the button without checking" foot-gun.
      - name: Verify CI Pass on this commit
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              check_name: 'CI Pass',
            });
            const ciPass = checkRuns.check_runs[0];
            if (!ciPass) {
              core.setFailed(`No CI Pass check found for ${sha}. Run CI on main before deploying.`);
              return;
            }
            if (ciPass.conclusion !== 'success') {
              core.setFailed(`CI Pass conclusion was '${ciPass.conclusion}' for ${sha}. Refusing to deploy.`);
              return;
            }
            console.log(`CI Pass green on ${sha} — proceeding.`);

  deploy:
    name: Deploy to Production
    needs: [preflight]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    # GitHub deployment environment "production" — adds a protection
    # surface (required reviewers, wait timers) configurable in repo settings.
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # See deploy-dev.yml for why this step exists. Same root cause:
      # [assets] directory = "./build" must exist before wrangler deploy.
      - name: Build SPA assets
        working-directory: apps/web
        run: pnpm run build:assets

      # Required scopes on CLOUDFLARE_API_TOKEN (repo secret):
      #   Account → Workers Scripts → Edit
      #   Account → D1 → Edit
      #   Account → Workers Tail → Read
      - name: Deploy to Cloudflare Workers (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          environment: production
