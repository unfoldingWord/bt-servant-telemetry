name: Deploy Dev

# Fires after CI passes on a push to main (i.e. after PR merge).
# Cloudflare Workers don't have per-PR preview URLs, so deploying every PR
# would just clobber dev with unreviewed code. Gating on the post-merge CI
# run means dev always reflects something that already passed review + CI.
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    # workflow_run fires on every CI completion — including failures. Only
    # deploy when CI succeeded; otherwise the deploy job is a no-op.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # The CI we're chaining off ran against this specific commit;
          # check it out so the deploy matches what was verified.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # Required scopes on CLOUDFLARE_API_TOKEN (repo secret):
      #   Account → Workers Scripts → Edit
      #   Account → D1 → Edit (for binding validation against the dev DB)
      #   Account → Workers Tail → Read (for tail_consumers wiring)
      # CF_ACCOUNT_ID lives in wrangler.toml [vars] now, but wrangler-action
      # still accepts accountId for unambiguity in multi-account scenarios.
      - name: Deploy to Cloudflare Workers (dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          environment: dev
